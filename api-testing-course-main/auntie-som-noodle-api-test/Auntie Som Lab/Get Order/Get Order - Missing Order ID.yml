info:
  name: Get Order - Missing Order ID
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/orders/"
  headers:
    - name: Authorization
      value: Bearer {{token}}

runtime:
  scripts:
    - type: after-response
      code: |-
        test("Verify error status", () => {
          expect(res.getStatus()).to.not.equal(200);
          expect(res.getStatus()).to.be.equal(400);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
