info:
  name: Get Order - Invalid Order ID
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/orders/ORD-invalid"

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();
        const expectedPrice = bru.getEnvVar("itemPrice") * bru.getEnvVar("validQuantity-1");
        const expectedOrderId = bru.getEnvVar("orderId");

        test("Verify error status", () => {
          expect(res.getStatus()).to.not.equal(200);
          expect(res.getStatus()).to.be.equal(404);
        });

        test("Verify response should contain 'error' field", () => {
          expect(body).to.have.property("error");
          expect(body).to.not.have.property("orderId");
        });

        test("Verify error message should be correct", () => {
          expect(body.error).to.be.a("string");
          expect(body.error).to.equal("Order not found");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
