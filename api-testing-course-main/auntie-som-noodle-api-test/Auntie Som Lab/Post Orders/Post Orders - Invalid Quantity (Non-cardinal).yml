info:
  name: Post Orders - Invalid Quantity (Non-cardinal)
  type: http
  seq: 9

http:
  method: POST
  url: "{{baseUrl}}/orders"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "itemId": {{itemId-2}},
        "quantity": -2
      }

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();

        test("Verify quantity <= 0 should fail", () => {
          expect(requestData.quantity).to.be.at.most(0);
        });

        test("Verify error status", () => {
          expect(res.getStatus()).to.not.equal(200);
          expect(res.getStatus()).to.be.oneOf([400, 422]);
        });

        test("Verify response should contain 'error' field", () => {
          expect(body).to.have.property("error");
          expect(body).to.not.have.property("orderId");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
